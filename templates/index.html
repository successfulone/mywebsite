<!DOCTYPE html>
<html>
<head>
    <title>DELSU CSE 25/26</title>

    <style>
        body {
            background-image: url("{{ url_for('static', filename='bg.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
            text-align: center;
            font-family: Arial;
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(30, 41, 59, 0.85);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(6px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        .logo img {
            height: 40px;
            width: 40px;
            border-radius: 50%;
        }

        .nav-links a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-2px);
        }

        h1 {
            color: #38bdf8;
            margin-top: 100px;
            font-size: 40px;
        }

        p {
            font-size: 18px;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .nav-links {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .nav-links a {
                margin: 5px 0;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">

        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
            <span>DELSU CSE</span>
        </div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
        </div>

    </div>

    <!-- MAIN CONTENT -->
    <h1>DELSU CSE 25/26</h1>
    <p>Department of Computer Science</p>

</body>
</html>
