<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
            margin: 0;
        }

        .navbar {
            background: #1e293b;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        h1 {
            color: #38bdf8;
            margin-top: 50px;
        }

.nav-links a {
    transition: all 0.3s ease;
    padding: 5px 10px;
    border-radius: 5px;
}

.nav-links a:hover {
    background: #38bdf8;
    color: #0f172a;
    transform: translateY(-2px);
}

@media (max-width: 768px) {

    .navbar {
        flex-direction: column;
        text-align: center;
        gap: 10px;
    }

    .nav-links {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .nav-links a {
        margin: 5px 0;
    }
}

    </style>
</head>

<body>

<div class="navbar">
    <div class="logo" style="display:flex; align-items:center; gap:10px;">
    <img src="{{ url_for('static', filename='logo.png') }}" 
         alt="Logo" 
         style="height:40px; width:40px; border-radius:50%;">

    <span>MyWebsite</span>
</div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/about">About</a>
    </div>
</div>

<h1>Welcome to my website 🎉</h1>
<p>This is my first real webpage using Flask.</p>

</body>
</html>
