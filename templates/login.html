<!DOCTYPE html>
<html>
<head>
    <title>Login - DELSU CSE</title>

    <style>
        body {
            background-image: url("{{ url_for('static', filename='bg.png') }}");
            background-size: cover;
            backdrop-filter: blur(6px);
            font-family: Arial;
            text-align: center;
            color: white;
        }

        .box {
            margin-top: 150px;
            background: rgba(0,0,0,0.7);
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            width: 250px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>DELSU CSE Portal</h2>
    <p>Enter your Matric Number</p>

    <form method="POST">
        <input type="text" name="matric" placeholder="Matric Number" required><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
